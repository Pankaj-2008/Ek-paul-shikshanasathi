<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Volunteer | यशस्वी फाउंडेशन</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="survey-header">
<h1>Volunteer Registration</h1>
<p>स्वयंसेवक म्हणून सहभागी व्हा</p>
</header>

<div class="survey-container">

<form id="volunteerForm" class="pro-form">

<h2>Join As Volunteer</h2>

<div class="form-group">
<label>Full Name *</label>
<input type="text" name="name" required>
</div>

<div class="form-group">
<label>Age *</label>
<select name="age" id="ageSelect" required>
<option value="">Select Age</option>
</select>
</div>

<div class="form-group">
<label>City / Village *</label>
<input type="text" name="city" required>
</div>

<div class="form-group">
<label>Skills *</label>
<input type="text" name="skills" placeholder="Teaching, Social Work..." required>
</div>

<div class="form-group">
<label>Availability *</label>
<select name="availability" required>
<option value="">Select</option>
<option>Weekend</option>
<option>Daily</option>
<option>Flexible</option>
</select>
</div>

<div class="form-group">
<label>Contact Number *</label>
<input type="text" name="contact" required>
</div>

<div class="form-group">
<label>Why do you want to join?</label>
<textarea name="message"></textarea>
</div>

<button type="submit" class="submit-btn">Submit Application</button>

</form>

</div>

<script>

// Age dropdown (15–60)
const ageSelect = document.getElementById("ageSelect");
for(let i=15;i<=60;i++){
let option = document.createElement("option");
option.value = i;
option.text = i;
ageSelect.appendChild(option);
}

// GOOGLE SCRIPT URL
const scriptURL="https://script.google.com/macros/s/AKfycbyV6XD4CeRuA7GDKFcwy6j7V9hMwOt9tUdMoXcb-znIHsZFsROoDBMevEpoFICk7aNQHA/exec";

// FORM SUBMIT
document.getElementById("volunteerForm").addEventListener("submit", function(e){

e.preventDefault();

const formData = new FormData(this);

fetch(scriptURL,{
method:"POST",
body: JSON.stringify(Object.fromEntries(formData)),
headers: {
"Content-Type": "application/json"
}
})
.then(response => response.text())   // ✅ FIX
.then(data => {
alert("Form Submitted Successfully ✅");
window.location.href = "index.html";
})
.catch(error => {
alert("Error submitting form ❌");
console.error(error);
});

});

</script>

</body>
</html>
