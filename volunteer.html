<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Volunteer | यशस्वी फाउंडेशन</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#f1f3f4;font-family:'Noto Sans Devanagari',sans-serif;}
.survey-box{max-width:700px;margin:40px auto;background:white;padding:30px;border-radius:10px;box-shadow:0 10px 25px rgba(0,0,0,0.1);}
label{font-weight:600;display:block;margin-top:20px;margin-bottom:6px;}
input,select,textarea{width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;font-size:14px;}
.submit-btn{margin-top:30px;background:#2f9e44;color:white;border:none;padding:12px;font-size:16px;border-radius:6px;cursor:pointer;width:100%;}
.submit-btn:hover{background:#22863a;}
</style>
</head>
<body>

<div class="survey-box">
<h2>Volunteer Registration</h2>

<form id="volunteerForm">

<label>Full Name *</label>
<input type="text" name="name" required>

<label>Age *</label>
<select name="age" id="ageSelect" required></select>

<label>City / Village *</label>
<input type="text" name="city" required>

<label>Skills *</label>
<input type="text" name="skills" placeholder="Teaching, Social Work..." required>

<label>Availability *</label>
<select name="availability" required>
<option value="">Select</option>
<option>Weekend</option>
<option>Daily</option>
<option>Flexible</option>
</select>

<label>Contact Number *</label>
<input type="text" name="contact" required>

<label>Why do you want to join?</label>
<textarea name="message"></textarea>

<button type="submit" class="submit-btn">Submit Application</button>
</form>
</div>

<script>
// Age dropdown 15-60
const ageSelect = document.getElementById("ageSelect");
for(let i=15; i<=60; i++){
  let option = document.createElement("option");
  option.value = i;
  option.text = i;
  ageSelect.appendChild(option);
}

// Form submit
const scriptURL = "https://script.google.com/macros/s/AKfycbzzzJPrtr1x_DRtrq6O66yK2IXn6JNjpVzpPWE-SgFMkvnmH8FNHWPOfmmhQ1dpvA0V/exec"; // /exec URL नक्की टाका
const form = document.getElementById("volunteerForm");

form.addEventListener("submit", function(e){
  e.preventDefault();
  const formData = new FormData(form);

  fetch(scriptURL, {
    method: "POST",
    body: formData
  })
  .then(response => response.text())   // check response
  .then(result => {
    console.log("Response from server:", result);
    alert("Survey Submitted Successfully ✅");
    window.location.href = "index.html";
  })
  .catch(error => {
    console.error(error);
    alert("Error submitting survey");
  });
});
  
</script>

</body>
</html>
