```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donate | यशस्वी फाउंडेशन</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

.survey-header {
  text-align: center;
  background: #4CAF50;
  color: white;
  padding: 20px;
}

.survey-container {
  max-width: 400px;
  background: white;
  margin: 30px auto;
  padding: 20px;
  border-radius: 10px;
}

.form-group {
  margin-bottom: 15px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
}

.submit-btn {
  width: 100%;
  padding: 12px;
  background: #4CAF50;
  color: white;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.success-msg {
  text-align: center;
  color: green;
  display: none;
}
</style>

</head>

<body>

<header class="survey-header">
<h1>Support Our Cause ❤️</h1>
<p>तुमचा छोटासा हातभार मोठा बदल घडवू शकतो</p>
</header>

<div class="survey-container">

<form action="https://script.google.com/macros/s/AKfycbzgUVeah1mKSXIBdauDzoFOKmdww89Z7mHtWwUtx7-HP8cvOstaMpdWSkNLUoA4TUQ3/exec" 
      method="POST" 
      target="hidden_iframe" 
      onsubmit="showSuccess()">

<h2>Make a Donation</h2>

<div style="text-align:center;">
<img src="qr.png" width="200">
<p>Scan QR to Donate</p>
</div>

<div class="form-group">
<label>Name *</label>
<input type="text" name="name" required>
</div>

<div class="form-group">
<label>Amount *</label>
<select name="amount" required>
<option value="">Select Amount</option>
<option>100</option>
<option>200</option>
<option>500</option>
<option>1000</option>
<option>Other</option>
</select>
</div>

<div class="form-group">
<label>Contact *</label>
<input type="text" name="contact" required>
</div>
  <input type="email" name="email" placeholder="Enter Email" required>

<button type="submit" class="submit-btn">Submit Donation</button>

</form>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<p class="success-msg" id="successMsg">✅ Donation Submitted Successfully!</p>

</div>

<script>
function showSuccess(){
  document.getElementById("successMsg").style.display = "block";
}
</script>

</body>
</html>
```
