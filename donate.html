<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donate | यशस्वी फाउंडेशन</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="survey-header">
<h1>Support Our Cause ❤️</h1>
<p>तुमचा छोटासा हातभार मोठा बदल घडवू शकतो</p>
</header>

<div class="survey-container">

<form id="donateForm" class="pro-form">

<h2>Make a Donation</h2>

<!-- QR -->
<div style="text-align:center;">
<img src="qr.png" width="200">
<p>Scan QR to Donate</p>
</div>

<div class="form-group">
<label>Name *</label>
<input type="text" name="name" required>
</div>

<div class="form-group">
<label>Amount *</label>
<select name="amount" required>
<option value="">Select Amount</option>
<option>100</option>
<option>200</option>
<option>500</option>
<option>1000</option>
<option>Other</option>
</select>
</div>

<div class="form-group">
<label>Contact *</label>
<input type="text" name="contact" required>
</div>

<button type="submit" class="submit-btn">Submit Donation</button>

</form>

</div>

<script>

<form action="https://script.google.com/macros/s/AKfycbzgUVeah1mKSXIBdauDzoFOKmdww89Z7mHtWwUtx7-HP8cvOstaMpdWSkNLUoA4TUQ3/exec" method="POST" target="hidden_iframe" onsubmit="showMessage()">

<h2>Make a Donation ❤️</h2>

<label>Name *</label>
<input type="text" name="name" required>

<label>Amount *</label>
<select name="amount" required>
<option value="">Select Amount</option>
<option>100</option>
<option>200</option>
<option>500</option>
<option>1000</option>
</select>

<label>Contact *</label>
<input type="text" name="contact" required>

<button type="submit">Submit Donation</button>

</form>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>
function showMessage(){
  alert("Donation Submitted ❤️");
}
</script>

</body>
</html>
