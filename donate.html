<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donate | यशस्वी फाउंडेशन</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="survey-header">
<h1>Support Our Cause ❤️</h1>
<p>तुमचा छोटासा हातभार मोठा बदल घडवू शकतो</p>
</header>

<div class="survey-container">

<form id="donateForm" class="pro-form">

<h2>Make a Donation</h2>

<!-- QR -->
<div style="text-align:center;">
<img src="qr.png" width="200">
<p>Scan QR to Donate</p>
</div>

<div class="form-group">
<label>Name *</label>
<input type="text" name="name" required>
</div>

<div class="form-group">
<label>Amount *</label>
<select name="amount" required>
<option value="">Select Amount</option>
<option>100</option>
<option>200</option>
<option>500</option>
<option>1000</option>
<option>Other</option>
</select>
</div>

<div class="form-group">
<label>Contact *</label>
<input type="text" name="contact" required>
</div>

<div class="form-group">
<label>Upload Payment Screenshot *</label>
<input type="file" name="file" id="fileInput" required>
</div>

<button type="submit" class="submit-btn">Submit Donation</button>

</form>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbyDfe4-ByfWpUWLs_2dm4KoL4r4ZEW1VUwvagU888j-1wnvnuwP7iH_w7icCdTgP-BZ/exec";

// convert file to base64
function getBase64(file){
return new Promise((resolve,reject)=>{
const reader = new FileReader();
reader.readAsDataURL(file);
reader.onload = ()=>resolve(reader.result);
reader.onerror = error => reject(error);
});
}

document.getElementById("donateForm").addEventListener("submit", async function(e){

e.preventDefault();

const form = this;
const file = document.getElementById("fileInput").files[0];

const base64 = await getBase64(file);

const formData = new FormData(form);
const data = Object.fromEntries(formData.entries());

data.file = base64;

fetch(scriptURL,{
method:"POST",
body: JSON.stringify(data),
headers: {"Content-Type":"application/json"}
})
.then(res=>res.text())
.then(()=>{
alert("Donation Submitted ❤️");
window.location.href="index.html";
})
.catch(()=>{
alert("Error ❌");
});

});

</script>

</body>
</html>
