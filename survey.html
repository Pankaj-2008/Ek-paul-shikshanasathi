<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Information Survey | Yashasvi Foundation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<style>

body{
background:#f1f3f4;
font-family:'Noto Sans Devanagari',sans-serif;
}

.survey-box{
max-width:700px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.survey-title{
font-size:26px;
margin-bottom:10px;
}

.survey-desc{
color:#555;
margin-bottom:25px;
}

label{
font-weight:600;
display:block;
margin-top:20px;
margin-bottom:6px;
}

input,select,textarea{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

.radio-group{
display:flex;
gap:20px;
margin-top:10px;
}

.submit-btn{
margin-top:30px;
background:#2f9e44;
color:white;
border:none;
padding:12px;
font-size:16px;
border-radius:6px;
cursor:pointer;
width:100%;
}

.submit-btn:hover{
background:#22863a;
}

.section{
margin-top:30px;
}

</style>

</head>

<body>

<div class="survey-box">

<h2 class="survey-title">Information Survey</h2>

<p class="survey-desc">
हा फॉर्म विद्यार्थ्याची आणि नागरिकांची माहिती मिळवण्यासाठी बनवलेला आहे.
</p>

<form id="surveyForm">

<label>Student or People ? *</label>

<div class="radio-group">
<label><input type="radio" name="type" value="student" required> Student</label>
<label><input type="radio" name="type" value="people"> People</label>
</div>

<!-- STUDENT SECTION -->

<div id="studentSection" class="section">

<h3>Student Information</h3>

<label>Name *</label>
<input type="text" name="name" required>

<label>Address *</label>
<input type="text" name="address" required>

<label>School Name *</label>
<input type="text" name="school" required>

<label>Class *</label>

<select name="class" required>

<option value="">Select Class</option>

<option>1st</option>
<option>2nd</option>
<option>3rd</option>
<option>4th</option>
<option>5th</option>
<option>6th</option>
<option>7th</option>
<option>8th</option>
<option>9th</option>
<option>10th</option>
<option>11th</option>
<option>12th</option>

</select>

<label>Age *</label>

<select name="age" id="ageSelect" required>
<option value="">Select Age</option>
</select>
  
<label>Which skill student have ? *</label>
<input type="text" name="skills" required>

<label id="dtypeLabel" style="display:none;">Type of Disability</label>

<input type="text" name="disabilityType" id="dtype" style="display:none;">

<label>Contact</label>
<input type="text" name="contact">

</div>

<button type="submit" class="submit-btn">Submit Survey</button>

</form>

</div>


<script>

const scriptURL="https://script.google.com/macros/s/AKfycbzFtx1H2v40UGxTpKZSoaNdKlQZmzbjzNuYZzwXtz_Zwa3iPqkAqyKAuDAssRTVjjgv/exec";

const form=document.getElementById("surveyForm");

form.addEventListener("submit",function(e){

e.preventDefault();

const formData=new FormData(form);

fetch(scriptURL,{
method:"POST",
body:formData
})
.then(response=>{

alert("Survey Submitted Successfully ✅");

window.location.href="index.html";

})
.catch(error=>{

alert("Error submitting survey");

});

});


// Disability logic

const disRadios=document.getElementsByName("disability");

const dtype=document.getElementById("dtype");
const dtypeLabel=document.getElementById("dtypeLabel");

disRadios.forEach(radio=>{

radio.addEventListener("change",function(){

if(this.value==="Yes"){

dtype.style.display="block";
dtypeLabel.style.display="block";

}
else{

dtype.style.display="none";
dtypeLabel.style.display="none";

}

});

});

</script>

  <script>

// Age dropdown 5 ते 100

const ageSelect=document.getElementById("ageSelect");

for(let i=5;i<=100;i++){

let option=document.createElement("option");

option.value=i;
option.text=i;

ageSelect.appendChild(option);

}

</script>
  
</body>
</html>
