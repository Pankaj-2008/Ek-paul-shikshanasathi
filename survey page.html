<form id="surveyForm">

<select name="type">
<option value="student">Student</option>
<option value="people">People</option>
</select>

<input type="text" name="name" placeholder="Name">

<input type="text" name="class" placeholder="Class">

<input type="number" name="age" placeholder="Age">

<input type="text" name="disability" placeholder="Disability">

<input type="text" name="contact" placeholder="Contact">

<input type="text" name="address" placeholder="Address">

<textarea name="reason" placeholder="Reason if not attending school"></textarea>

<textarea name="skills" placeholder="Skills"></textarea>

<button type="submit">Submit</button>

</form>


<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbx2iByCMIMRfUOf8VkV1O8cgMXRWq_uj5ngxz1sSvdtxV60HXo7Gow795FAc9nMOH6e/exec";

const form = document.getElementById("surveyForm");

form.addEventListener("submit", function(e){

e.preventDefault();

const formData = new FormData(form);
const data = Object.fromEntries(formData.entries());

fetch(scriptURL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
})

.then(response => response.text())
.then(result => {

alert("Survey Submitted Successfully");

window.location.href="index.html";

})

.catch(error => {

alert("Error submitting survey");

console.error(error);

});

});

</script>
